[extruder]
step_pin: ebb: PD0
dir_pin: ebb: PD1
enable_pin: !ebb: PD2
microsteps: 16
gear_ratio: 7.5:1
rotation_distance: 34.783
nozzle_diameter: 0.400
filament_diameter: 1.750
# min_extrude_temp: 20
max_extrude_only_distance: 100.0
max_extrude_cross_section: 999.0
instantaneous_corner_velocity: 2.5
max_extrude_only_velocity: 75
max_extrude_only_accel: 3000
pressure_advance: 0.025
pressure_advance_smooth_time: 0.03
heater_pin: ebb: PB13
sensor_type: MAX31865
sensor_pin: ebb: PA4
spi_speed: 4000000
spi_software_miso_pin: ebb: PA6
spi_software_mosi_pin: ebb: PA7
spi_software_sclk_pin: ebb: PA5
rtd_nominal_r: 1000
rtd_reference_r: 4300
rtd_num_of_wires: 2
rtd_use_50Hz_filter: True
pwm_cycle_time: 0.05
smooth_time: 0.5
min_temp: 0
max_temp: 410

[firmware_retraction]
retract_length: 0.4
retract_speed: 40.0
unretract_speed: 40.0

[fan]
pin: ebb: PA1

[heater_fan v6_fan]
pin: ebb: PA0
heater: extruder
heater_temp: 50.0
